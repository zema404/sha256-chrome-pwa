<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <title>SHA-256 Local</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <style>
    :root{--bg:#070b18;--panel:rgba(255,255,255,.09);--panel2:rgba(255,255,255,.14);--text:#f8fafc;--muted:#a7b0c4;--line:rgba(255,255,255,.16);--brand:#7c3aed;--brand2:#06b6d4;--danger:#fb7185;--ok:#34d399;--radius:24px;--shadow:0 22px 80px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 10%,rgba(124,58,237,.38),transparent 34%),radial-gradient(circle at 88% 18%,rgba(6,182,212,.26),transparent 28%),linear-gradient(145deg,#070b18 0%,#101529 52%,#080b13 100%);padding:18px}.shell{width:min(980px,100%);margin:0 auto;min-height:calc(100vh - 36px);display:grid;place-items:center}.card{width:100%;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));box-shadow:var(--shadow);backdrop-filter:blur(18px);overflow:hidden}header{padding:28px;border-bottom:1px solid var(--line);display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap}.brand{display:flex;gap:14px;align-items:center}.logo{width:54px;height:54px;display:grid;place-items:center;border-radius:17px;background:linear-gradient(135deg,var(--brand),var(--brand2));font-weight:900;font-size:30px;letter-spacing:-.05em;box-shadow:0 14px 34px rgba(124,58,237,.35)}h1{margin:0;font-size:clamp(28px,5vw,48px);line-height:1;letter-spacing:-.06em}.subtitle{margin:8px 0 0;color:var(--muted);font-size:15px}.install{display:none;border:0;color:white;background:linear-gradient(135deg,var(--brand),var(--brand2));padding:13px 18px;border-radius:999px;font-weight:800;cursor:pointer}main{padding:28px}.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}.box{border:1px solid var(--line);border-radius:22px;background:rgba(7,11,24,.42);padding:18px}label{display:block;font-size:13px;color:var(--muted);margin:0 0 10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.26);color:var(--text);outline:none;padding:16px;font:500 16px/1.45 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}textarea{min-height:190px;resize:vertical}textarea:focus,input[type=text]:focus{border-color:rgba(124,58,237,.85);box-shadow:0 0 0 4px rgba(124,58,237,.18)}input[type=file]{width:100%;border:1px dashed var(--line);border-radius:18px;padding:16px;background:rgba(255,255,255,.05);color:var(--muted)}.hint{margin:10px 0 0;color:var(--muted);font-size:13px;line-height:1.45}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}button{border:1px solid var(--line);color:var(--text);background:var(--panel2);padding:13px 15px;border-radius:15px;font-weight:800;cursor:pointer;transition:transform .12s,background .12s,border-color .12s;touch-action:manipulation}button:active{transform:scale(.98)}button:hover{background:rgba(255,255,255,.16)}button.primary{border:0;background:linear-gradient(135deg,var(--brand),var(--brand2))}button.danger{border-color:rgba(251,113,133,.45);color:#fecdd3}.output{margin-top:18px}.status{min-height:24px;margin-top:12px;color:var(--muted);font-size:14px}.status.ok{color:var(--ok)}.status.err{color:var(--danger)}footer{padding:0 28px 24px;color:var(--muted);font-size:12px;text-align:center}@media(max-width:840px){body{padding:12px}.shell{min-height:calc(100vh - 24px)}header,main{padding:20px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="shell"><section class="card" aria-label="Application SHA-256 locale"><header><div class="brand"><div class="logo">#</div><div><h1>SHA-256 Local</h1><p class="subtitle">Hash texte ou fichier, 100% local dans ton navigateur.</p></div></div><button id="installBtn" class="install" type="button">Installer</button></header><main><div class="grid"><div class="box"><label for="textInput">Texte</label><textarea id="textInput" spellcheck="false" placeholder="Colle ton texte ici..."></textarea><p class="hint">Le hash se génère automatiquement. Aucun contenu ne quitte l’appareil.</p><div class="actions"><button id="hashTextBtn" class="primary" type="button">Générer SHA-256</button><button id="clearBtn" class="danger" type="button">Reset</button></div></div><div class="box"><label for="fileInput">Fichier</label><input id="fileInput" type="file"><p class="hint" id="fileHint">Choisis un fichier pour calculer son SHA-256 localement.</p><div class="actions"><button id="downloadBtn" type="button">Télécharger .txt</button></div></div></div><div class="box output"><label for="hashOutput">Résultat SHA-256</label><input id="hashOutput" type="text" readonly placeholder="Le hash apparaîtra ici"><div class="actions"><button id="copyBtn" class="primary" type="button">Copier</button></div><div id="status" class="status" role="status" aria-live="polite"></div></div></main><footer>Application locale offline. SHA-256 via Web Crypto API.</footer></section></div>
  <script>
    const textInput=document.getElementById('textInput'),fileInput=document.getElementById('fileInput'),hashOutput=document.getElementById('hashOutput'),statusEl=document.getElementById('status'),fileHint=document.getElementById('fileHint'),installBtn=document.getElementById('installBtn');let deferredInstallPrompt=null,lastFileName='',debounceTimer=null;function setStatus(m,t=''){statusEl.textContent=m;statusEl.className='status'+(t?' '+t:'')}function bytesToHex(b){return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}async function sha256(data){return bytesToHex(await crypto.subtle.digest('SHA-256',data))}async function hashText(){const value=textInput.value;lastFileName='';fileInput.value='';fileHint.textContent='Choisis un fichier pour calculer son SHA-256 localement.';if(!value){hashOutput.value='';setStatus('Entre du texte ou choisis un fichier.');return}hashOutput.value=await sha256(new TextEncoder().encode(value));setStatus('Hash texte généré.','ok')}async function hashFile(file){if(!file)return;textInput.value='';lastFileName=file.name||'fichier';fileHint.textContent=`${lastFileName} · ${(file.size/1024).toFixed(2)} Ko`;setStatus('Calcul du hash fichier...');hashOutput.value=await sha256(await file.arrayBuffer());setStatus('Hash fichier généré.','ok')}function resetAll(message='Reset effectué.'){textInput.value='';fileInput.value='';hashOutput.value='';lastFileName='';fileHint.textContent='Choisis un fichier pour calculer son SHA-256 localement.';setStatus(message)}async function copyThenReset(){const hash=hashOutput.value.trim();if(!hash){setStatus('Aucun hash à copier.','err');return}try{await navigator.clipboard.writeText(hash)}catch(e){hashOutput.select();document.execCommand('copy')}resetAll('Hash copié. Champs réinitialisés.');statusEl.classList.add('ok')}function downloadHash(){const hash=hashOutput.value.trim();if(!hash){setStatus('Aucun hash à télécharger.','err');return}const name=lastFileName?`${lastFileName}.sha256.txt`:'sha256.txt',blob=new Blob([hash+'\n'],{type:'text/plain;charset=utf-8'}),url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=name;document.body.appendChild(link);link.click();link.remove();URL.revokeObjectURL(url);setStatus('Fichier .txt téléchargé.','ok')}textInput.addEventListener('input',()=>{clearTimeout(debounceTimer);debounceTimer=setTimeout(hashText,180)});document.getElementById('hashTextBtn').addEventListener('click',hashText);document.getElementById('clearBtn').addEventListener('click',()=>resetAll());document.getElementById('copyBtn').addEventListener('click',copyThenReset);document.getElementById('downloadBtn').addEventListener('click',downloadHash);fileInput.addEventListener('change',e=>hashFile(e.target.files[0]));window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;installBtn.style.display='inline-flex'});installBtn.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice;deferredInstallPrompt=null;installBtn.style.display='none'});if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}))}
  </script>
</body>
</html>
